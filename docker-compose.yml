version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: mazad-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  redis:
    image: redis:alpine
    container_name: mazad-redis
    command: redis-server --requirepass 4goJgxRDXASZqWGW9Vi
    ports:
      - "50339:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  mongodb_data:
  redis_data:
